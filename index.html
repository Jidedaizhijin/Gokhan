<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>English OS · 历史记录 + 统计</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f6f7fb;
      --card: rgba(255, 255, 255, 0.86);
      --text: #182033;
      --muted: #6b7280;
      --line: rgba(24, 32, 51, 0.09);
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --success: #16a34a;
      --shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      --radius: 24px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 34%),
                  radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.12), transparent 32%),
                  var(--bg);
      min-height: 100vh;
    }

    .page {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    /* 头部区域 */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 28px;
    }
    .title-section .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid var(--line);
      padding: 6px 14px;
      border-radius: 999px;
      font-weight: 650;
      font-size: 13px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 0.98;
      letter-spacing: -0.055em;
    }
    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }
    .date-picker-area {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 40px;
      padding: 8px 16px;
      backdrop-filter: blur(12px);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .date-nav-btn {
      background: rgba(0,0,0,0.05);
      border: none;
      font-size: 20px;
      cursor: pointer;
      border-radius: 32px;
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
    }
    .date-nav-btn:hover {
      background: rgba(0,0,0,0.1);
    }
    #datePicker {
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 8px 14px;
      font-family: inherit;
      background: rgba(255,255,255,0.7);
    }
    .today-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 32px;
      padding: 8px 16px;
      font-weight: 600;
      cursor: pointer;
    }

    /* 网格布局 */
    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr;
      gap: 20px;
      margin-top: 6px;
    }
    .stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 22px 24px;
    }
    .card h2 {
      margin: 0 0 18px 0;
      font-size: 20px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    .mission-list {
      display: grid;
      gap: 10px;
    }
    .mission {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.5);
    }
    .mission label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 570;
    }
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
    }
    .tag {
      font-size: 11px;
      font-weight: 700;
      background: var(--accent-soft);
      padding: 4px 10px;
      border-radius: 999px;
      color: var(--accent);
    }
    .progress-wrap {
      margin-top: 18px;
    }
    .progress-head {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .bar {
      height: 10px;
      background: rgba(148, 163, 184, 0.3);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      border-radius: inherit;
      transition: width 0.2s;
    }
    textarea, input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 18px;
      padding: 12px 15px;
      font: inherit;
      outline: none;
      resize: vertical;
    }
    textarea:focus, input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }
    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    button {
      border: none;
      background: var(--accent);
      color: white;
      padding: 10px 16px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
    }
    button.secondary {
      background: rgba(24, 32, 51, 0.08);
      color: var(--text);
    }
    .stat-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px dashed var(--line);
      padding-bottom: 8px;
    }
    .stat-label {
      font-size: 14px;
      color: var(--muted);
    }
    .stat-number {
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.02em;
    }
    .week-bars {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 12px;
    }
    .day-bar {
      flex: 1;
      text-align: center;
    }
    .bar-graph {
      background: rgba(148, 163, 184, 0.3);
      height: 80px;
      border-radius: 12px;
      margin-bottom: 6px;
      position: relative;
      overflow: hidden;
    }
    .fill-graph {
      background: var(--accent);
      width: 100%;
      position: absolute;
      bottom: 0;
      left: 0;
      transition: height 0.2s;
    }
    .day-label {
      font-size: 11px;
      color: var(--muted);
    }
    .quote {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
    }
    .footer {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 800px) {
      .grid { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
<main class="page">
  <header>
    <div class="title-section">
      <div class="eyebrow">IELTS · Daily Output</div>
      <h1>English OS</h1>
      <p class="subtitle">Track progress, review history, stay consistent.</p>
    </div>
    <div class="date-picker-area">
      <button class="date-nav-btn" id="prevDayBtn">←</button>
      <input type="date" id="datePicker" style="border:none; background:transparent; font-weight:500;">
      <button class="date-nav-btn" id="nextDayBtn">→</button>
      <button class="today-btn" id="todayBtn">Today</button>
    </div>
  </header>

  <div class="grid">
    <!-- 左侧：任务 + 日志 -->
    <div class="stack">
      <div class="card">
        <h2>📋 Today's Plan</h2>
        <div class="mission-list" id="missionList"></div>
        <div class="progress-wrap">
          <div class="progress-head"><span>Today's progress</span><strong id="progressText">0/5</strong></div>
          <div class="bar"><span id="progressBar"></span></div>
        </div>
      </div>

      <div class="card">
        <h2>✍️ Daily Log</h2>
        <textarea id="reflection" rows="3" placeholder="What did I practice today? Challenges? Tomorrow's focus..."></textarea>
        <div class="button-row">
          <button id="saveLogBtn">Save</button>
          <button class="secondary" id="clearDayBtn">Clear today</button>
        </div>
      </div>
    </div>

    <!-- 右侧：统计 + 句子输出 -->
    <div class="stack">
      <div class="card">
        <h2>📊 Progress Stats</h2>
        <div class="stat-grid">
          <div class="stat-item"><span class="stat-label">🔥 连续打卡</span><span class="stat-number" id="streakCount">0</span><span>天</span></div>
          <div class="stat-item"><span class="stat-label">📈 近7天平均完成率</span><span class="stat-number" id="weeklyAvg">0%</span></div>
        </div>
        <div style="margin-top: 16px;"><span class="stat-label">📅 近7天任务完成率</span></div>
        <div class="week-bars" id="weekBars"></div>
      </div>

      <div class="card">
        <h2>🏆 任务累计次数</h2>
        <div id="taskStats" style="display: flex; flex-wrap: wrap; gap: 14px; justify-content: space-between;"></div>
      </div>

      <div class="card">
        <p class="quote">Build proof, one day at a time.</p>
        <input type="text" id="sentence" placeholder="One sentence output today ·  eg: I completed a full IELTS listening section with 35/40." />
      </div>
    </div>
  </div>
  <div class="footer">English OS · 本地存储，仅自己可见</div>
</main>

<script>
  // 任务定义 (移除所有外贸/memotune)
  const TASKS = [
    { id: "listening", label: "Listening · 30 min", tag: "input" },
    { id: "speaking", label: "Speaking · 20 min", tag: "output" },
    { id: "reading", label: "Reading · 1 passage", tag: "focus" },
    { id: "writing", label: "Writing · 1 paragraph", tag: "logic" },
    { id: "vocabulary", label: "Vocabulary · 10 words", tag: "words" }
  ];

  // 工具函数：获取某一天的存储 key
  function getStorageKey(dateStr) {
    return `englishos-${dateStr}`;
  }

  // 获取某一天的数据结构，默认空
  function getDayData(dateStr) {
    const key = getStorageKey(dateStr);
    const raw = localStorage.getItem(key);
    if (raw) {
      try {
        return JSON.parse(raw);
      } catch(e) { return null; }
    }
    return null;
  }

  function saveDayData(dateStr, data) {
    const key = getStorageKey(dateStr);
    localStorage.setItem(key, JSON.stringify(data));
  }

  // 初始化某一天的数据（若没有则创建）
  function initDayDataIfNeeded(dateStr) {
    let data = getDayData(dateStr);
    if (!data) {
      const tasksState = {};
      TASKS.forEach(t => tasksState[t.id] = false);
      data = {
        tasks: tasksState,
        reflection: "",
        sentence: ""
      };
      saveDayData(dateStr, data);
    }
    return data;
  }

  // 全局当前日期
  let currentDate = new Date();
  let currentDateStr = currentDate.toISOString().slice(0,10);
  let currentData = null;

  // DOM 元素
  const missionListDiv = document.getElementById("missionList");
  const reflectionText = document.getElementById("reflection");
  const sentenceInput = document.getElementById("sentence");
  const progressTextSpan = document.getElementById("progressText");
  const progressBarSpan = document.getElementById("progressBar");
  const datePicker = document.getElementById("datePicker");
  const prevBtn = document.getElementById("prevDayBtn");
  const nextBtn = document.getElementById("nextDayBtn");
  const todayBtn = document.getElementById("todayBtn");
  const saveLogBtn = document.getElementById("saveLogBtn");
  const clearDayBtn = document.getElementById("clearDayBtn");

  // 渲染当前日期的任务UI
  function renderTasks() {
    if (!currentData) return;
    missionListDiv.innerHTML = "";
    TASKS.forEach(task => {
      const checked = currentData.tasks[task.id] || false;
      const missionDiv = document.createElement("div");
      missionDiv.className = "mission";
      missionDiv.innerHTML = `
        <label>
          <input type="checkbox" data-task-id="${task.id}" ${checked ? "checked" : ""} />
          <span>${task.label}</span>
        </label>
        <span class="tag">${task.tag}</span>
      `;
      missionListDiv.appendChild(missionDiv);
    });
    // 绑定checkbox变化事件
    document.querySelectorAll("#missionList input[type='checkbox']").forEach(cb => {
      cb.addEventListener("change", (e) => {
        const taskId = e.target.getAttribute("data-task-id");
        if (currentData) {
          currentData.tasks[taskId] = e.target.checked;
          saveDayData(currentDateStr, currentData);
          updateProgressUI();
          updateAllStats();      // 统计重算
        }
      });
    });
    updateProgressUI();
  }

  function updateProgressUI() {
    if (!currentData) return;
    const total = TASKS.length;
    let done = 0;
    TASKS.forEach(t => { if (currentData.tasks[t.id]) done++; });
    progressTextSpan.innerText = `${done}/${total}`;
    const percent = (done / total) * 100;
    progressBarSpan.style.width = `${percent}%`;
  }

  // 加载指定日期的数据，刷新界面
  function loadDate(dateStr) {
    currentDateStr = dateStr;
    datePicker.value = dateStr;
    // 初始化或获取
    currentData = initDayDataIfNeeded(dateStr);
    // 更新文本域
    reflectionText.value = currentData.reflection || "";
    sentenceInput.value = currentData.sentence || "";
    renderTasks();
    updateAllStats();
  }

  // 保存当前日志/句子至 currentData
  function saveCurrentLogAndSentence() {
    if (!currentData) return;
    currentData.reflection = reflectionText.value;
    currentData.sentence = sentenceInput.value;
    saveDayData(currentDateStr, currentData);
  }

  // 清空当前日所有内容（任务全未勾，日志清空，句子清空）
  function clearCurrentDay() {
    if (!confirm(`清除 ${currentDateStr} 的所有学习记录？`)) return;
    const emptyTasks = {};
    TASKS.forEach(t => emptyTasks[t.id] = false);
    currentData = {
      tasks: emptyTasks,
      reflection: "",
      sentence: ""
    };
    saveDayData(currentDateStr, currentData);
    reflectionText.value = "";
    sentenceInput.value = "";
    renderTasks();
    updateAllStats();
  }

  // ---------- 统计模块 ----------
  function getAllHistoryDates() {
    const keys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith("englishos-")) {
        const datePart = key.replace("englishos-", "");
        if (/^\d{4}-\d{2}-\d{2}$/.test(datePart)) keys.push(datePart);
      }
    }
    return keys.sort();
  }

  // 获取某个日期的完成率 (0-1)
  function getCompletionRate(dateStr) {
    const data = getDayData(dateStr);
    if (!data) return 0;
    let done = 0;
    TASKS.forEach(t => { if (data.tasks[t.id]) done++; });
    return done / TASKS.length;
  }

  // 计算连续打卡天数（打卡定义：当天至少完成1个任务）
  function computeStreak(todayDateStr) {
    let streak = 0;
    let checkDate = new Date(todayDateStr);
    while (true) {
      const dateKey = checkDate.toISOString().slice(0,10);
      const data = getDayData(dateKey);
      let hasAnyTask = false;
      if (data) {
        hasAnyTask = TASKS.some(t => data.tasks[t.id] === true);
      }
      if (hasAnyTask) {
        streak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        break;
      }
    }
    return streak;
  }

  function getLast7DaysArray(referenceDateStr) {
    const ref = new Date(referenceDateStr);
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(ref);
      d.setDate(ref.getDate() - i);
      days.push(d.toISOString().slice(0,10));
    }
    return days;
  }

  function updateWeekBars(centerDateStr) {
    const days = getLast7DaysArray(centerDateStr);
    const container = document.getElementById("weekBars");
    container.innerHTML = "";
    let totalRate = 0;
    for (let d of days) {
      const rate = getCompletionRate(d);
      totalRate += rate;
      const percent = rate * 100;
      const barDiv = document.createElement("div");
      barDiv.className = "day-bar";
      barDiv.innerHTML = `
        <div class="bar-graph" style="position:relative;">
          <div class="fill-graph" style="height: ${percent}%; bottom:0; background:var(--accent);"></div>
        </div>
        <div class="day-label">${d.slice(5)}</div>
      `;
      container.appendChild(barDiv);
    }
    const avg = (totalRate / 7) * 100;
    document.getElementById("weeklyAvg").innerText = Math.round(avg) + "%";
  }

  // 各任务累计完成次数
  function updateTaskCumulative() {
    const allDates = getAllHistoryDates();
    const counts = {};
    TASKS.forEach(t => counts[t.id] = 0);
    for (let date of allDates) {
      const data = getDayData(date);
      if (data) {
        TASKS.forEach(t => {
          if (data.tasks[t.id]) counts[t.id]++;
        });
      }
    }
    const container = document.getElementById("taskStats");
    container.innerHTML = "";
    for (let t of TASKS) {
      const val = counts[t.id];
      const pill = document.createElement("div");
      pill.style.background = "var(--accent-soft)";
      pill.style.padding = "8px 14px";
      pill.style.borderRadius = "40px";
      pill.style.minWidth = "100px";
      pill.style.textAlign = "center";
      pill.innerHTML = `<div style="font-weight:700;">${t.label.split('·')[0]}</div><div style="font-size:24px; font-weight:800;">${val}</div><div style="font-size:10px;">次</div>`;
      container.appendChild(pill);
    }
  }

  function updateStreakAndBar() {
    const todayStr = new Date().toISOString().slice(0,10);
    const streak = computeStreak(todayStr);
    document.getElementById("streakCount").innerText = streak;
    // 用当前显示的日期为中心更新近7天，使体验顺畅
    updateWeekBars(currentDateStr);
  }

  function updateAllStats() {
    updateTaskCumulative();
    updateStreakAndBar();
  }

  // 日期变更联动
  function changeDate(delta) {
    const newDate = new Date(currentDateStr);
    newDate.setDate(newDate.getDate() + delta);
    const newStr = newDate.toISOString().slice(0,10);
    currentDateStr = newStr;
    loadDate(currentDateStr);
  }

  function goToday() {
    const today = new Date().toISOString().slice(0,10);
    currentDateStr = today;
    loadDate(currentDateStr);
  }

  // 绑定事件 & 初始化
  function bindEvents() {
    prevBtn.addEventListener("click", () => changeDate(-1));
    nextBtn.addEventListener("click", () => changeDate(1));
    todayBtn.addEventListener("click", goToday);
    datePicker.addEventListener("change", (e) => {
      currentDateStr = e.target.value;
      loadDate(currentDateStr);
    });
    saveLogBtn.addEventListener("click", () => {
      saveCurrentLogAndSentence();
      alert("Saved.");
    });
    clearDayBtn.addEventListener("click", clearCurrentDay);
    reflectionText.addEventListener("blur", saveCurrentLogAndSentence);
    sentenceInput.addEventListener("blur", saveCurrentLogAndSentence);
  }

  // 初始加载
  function init() {
    bindEvents();
    const todayStr = new Date().toISOString().slice(0,10);
    currentDateStr = todayStr;
    loadDate(currentDateStr);
  }
  init();
</script>
</body>
</html>
